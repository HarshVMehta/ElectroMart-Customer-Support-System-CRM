<template>
    <section class="support-page">
        <div class="bg-grid" aria-hidden="true"></div>
        <div class="bg-blob blob-1" aria-hidden="true"></div>
        <div class="bg-blob blob-2" aria-hidden="true"></div>

        <div class="content-shell">
            <div class="top-actions">
                <button class="nav-pill" type="button" onclick={handleGoBack}>
                    <span class="nav-pill-icon">←</span>
                    <span>Back</span>
                </button>
                <button class="nav-pill secondary" type="button" onclick={navigateToKnowledgeBase}>
                    <span class="nav-pill-icon">📚</span>
                    <span>Browse Knowledge Base</span>
                </button>
            </div>

            <div class="layout-grid">
                <aside class="support-intro">
                    <p class="eyebrow">ElectroMart Customer Care</p>
                    <h1>Raise a Case When Self-Service Is Not Enough</h1>
                    <p class="intro-copy">
                        Share your issue details and we will route your request to the right support team quickly.
                    </p>

                    <div class="info-list">
                        <div class="info-item">
                            <span class="info-icon">⚡</span>
                            <div>
                                <h3>Fast Routing</h3>
                                <p>Requests are auto-assigned to the right queue based on product and issue type.</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">🛡️</span>
                            <div>
                                <h3>Secure Details</h3>
                                <p>Your data is submitted directly into Salesforce Service Cloud.</p>
                            </div>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">📞</span>
                            <div>
                                <h3>Response SLA</h3>
                                <p>Standard requests are reviewed within 24 hours and urgent issues faster.</p>
                            </div>
                        </div>
                    </div>

                    <div class="sla-panel">
                        <div class="sla-item">
                            <p>Premium</p>
                            <strong>4 Hour SLA</strong>
                        </div>
                        <div class="sla-item">
                            <p>Standard</p>
                            <strong>24 Hour SLA</strong>
                        </div>
                    </div>
                </aside>

                <div class="form-container">
                    <div class="form-card">
                        <div class="form-header">
                            <h2>Raise Support Request</h2>
                            <p>Tell us about your issue and we will get back to you as soon as possible.</p>
                            <div class="form-steps">
                                <span>1. Contact</span>
                                <span>2. Product</span>
                                <span>3. Issue Details</span>
                            </div>
                        </div>

                        <div class="form-body">
                            <template if:true={showInlineSuccess}>
                                <div class="success-message" role="status">
                                    <span class="success-icon"></span>
                                    <span>{successMessage}</span>
                                </div>
                            </template>

                            <div class="form-group">
                                <label class="form-label">
                                    Contact Name
                                    <span class="required-indicator">*</span>
                                </label>
                                <input
                                    type="text"
                                    data-field="name"
                                    class={nameInputClass}
                                    placeholder="Enter your full name"
                                    value={name}
                                    oninput={handleName}
                                    maxlength="100"
                                    required
                                />
                                <template if:true={errors.name}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.name}</span>
                                    </div>
                                </template>
                                <div class="field-hint">At least 2 letters (no digits or special characters)</div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Email Address
                                    <span class="required-indicator">*</span>
                                </label>
                                <input
                                    type="email"
                                    data-field="email"
                                    class={emailInputClass}
                                    placeholder="your@example.com"
                                    value={email}
                                    oninput={handleEmail}
                                    maxlength="100"
                                    required
                                />
                                <template if:true={errors.email}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.email}</span>
                                    </div>
                                </template>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Subject
                                    <span class="required-indicator">*</span>
                                </label>
                                <input
                                    type="text"
                                    data-field="subject"
                                    class={subjectInputClass}
                                    placeholder="Brief description of your issue"
                                    value={subject}
                                    oninput={handleSubject}
                                    maxlength="100"
                                    required
                                />
                                <div class={subjectCharCountClass}>
                                    {subjectLength}/100 characters
                                </div>
                                <template if:true={errors.subject}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.subject}</span>
                                    </div>
                                </template>
                                <div class="field-hint">Minimum 5 characters required</div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Product Category
                                    <span class="required-indicator">*</span>
                                </label>
                                <select
                                    data-field="product"
                                    class={productSelectClass}
                                    onchange={handleProduct}
                                    required
                                >
                                    <option value="">-- Select a Product --</option>
                                    <option value="Mobile">📱 Mobile</option>
                                    <option value="Laptop">💻 Laptop</option>
                                    <option value="Television">📺 Television</option>
                                    <option value="Home Appliance">🏠 Home Appliance</option>
                                    <option value="Warranty">🛡️ Warranty</option>
                                </select>
                                <template if:true={errors.product}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.product}</span>
                                    </div>
                                </template>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Issue Category
                                    <span class="required-indicator">*</span>
                                </label>
                                <select
                                    data-field="issueCategory"
                                    class={issueCategorySelectClass}
                                    onchange={handleIssue}
                                    required
                                >
                                    <option value="">-- Select Issue Type --</option>
                                    <option value="Hardware Issue">Hardware Issue</option>
                                    <option value="Software Issue">Software Issue</option>
                                    <option value="Installation Issue">Installation Issue</option>
                                    <option value="Warranty Claim">Warranty Claim</option>
                                    <option value="Replacement Request">Replacement Request</option>
                                    <option value="Other">Other</option>
                                </select>
                                <template if:true={errors.issueCategory}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.issueCategory}</span>
                                    </div>
                                </template>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Description
                                    <span class="required-indicator">*</span>
                                </label>
                                <textarea
                                    data-field="description"
                                    class={descriptionTextareaClass}
                                    placeholder="Please provide detailed information about your issue..."
                                    oninput={handleDescription}
                                    maxlength="2000"
                                    rows="5"
                                    required
                                ></textarea>
                                <div class={descriptionCharCountClass}>
                                    {descriptionLength}/2000 characters
                                </div>
                                <template if:true={errors.description}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.description}</span>
                                    </div>
                                </template>
                                <div class="field-hint">Minimum 10 characters required</div>
                            </div>

                            <div class="buttons-container">
                                <button
                                    class="btn btn-submit"
                                    type="button"
                                    onclick={handleSubmit}
                                    disabled={isLoading}
                                >
                                    <template if:true={isLoading}>
                                        <div class="loading-spinner"></div>
                                        <span>Submitting...</span>
                                    </template>
                                    <template if:false={isLoading}>
                                        <span>Submit Request</span>
                                    </template>
                                </button>
                                <button
                                    class="btn btn-reset"
                                    type="button"
                                    onclick={handleReset}
                                    disabled={isLoading}
                                >
                                    Clear Form
                                </button>
                            </div>

                            <div class="back-link-wrap">
                                <button class="back-link" type="button" onclick={handleGoBack}>
                                    ← Go back to previous page
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</template>
