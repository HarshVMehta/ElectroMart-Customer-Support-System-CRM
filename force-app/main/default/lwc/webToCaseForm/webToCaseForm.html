<template>
    <section class="support-page">
        <div class="bg-grid" aria-hidden="true"></div>
        <div class="bg-blob blob-1" aria-hidden="true"></div>
        <div class="bg-blob blob-2" aria-hidden="true"></div>

        <div class="content-shell">
            <div class="top-actions">
                <button class="nav-pill" type="button" onclick={handleGoBack}>
                    <span class="nav-pill-icon">←</span>
                    <span>Back</span>
                </button>
                <button class="nav-pill secondary" type="button" onclick={navigateToKnowledgeBase}>
                    <span class="nav-pill-icon">📚</span>
                    <span>Browse Knowledge Base</span>
                </button>
            </div>

            <div class="form-layout">
                <header class="intro-banner">
                    <p class="eyebrow">ElectroMart Customer Care</p>
                    <h1>Raise a Support Request</h1>
                    <p>
                        Fill out the form below and we will create your support case immediately.
                        You will receive your case details by email after submission.
                    </p>
                </header>

                <div class="form-card">
                    <div class="form-header">
                        <h2>Support Form</h2>
                        <p>Fields marked with * are required.</p>
                        <div class="form-steps">
                            <span>1. Contact</span>
                            <span>2. Case Details</span>
                            <span>3. Submit</span>
                        </div>
                    </div>

                    <div class="form-body">
                        <div class="form-row two-col">
                            <div class="form-group">
                                <label class="form-label">
                                    Contact Name
                                    <span class="required-indicator">*</span>
                                </label>
                                <input
                                    type="text"
                                    data-field="name"
                                    class={nameInputClass}
                                    placeholder="Enter your full name"
                                    value={name}
                                    oninput={handleName}
                                    maxlength="100"
                                    required
                                />
                                <template if:true={errors.name}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.name}</span>
                                    </div>
                                </template>
                                <div class="field-hint">At least 2 letters (no digits or special characters)</div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Email Address
                                    <span class="required-indicator">*</span>
                                </label>
                                <input
                                    type="email"
                                    data-field="email"
                                    class={emailInputClass}
                                    placeholder="your@example.com"
                                    value={email}
                                    oninput={handleEmail}
                                    maxlength="100"
                                    required
                                />
                                <template if:true={errors.email}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.email}</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Subject
                                <span class="required-indicator">*</span>
                            </label>
                            <input
                                type="text"
                                data-field="subject"
                                class={subjectInputClass}
                                placeholder="Brief description of your issue"
                                value={subject}
                                oninput={handleSubject}
                                maxlength="100"
                                required
                            />
                            <div class={subjectCharCountClass}>
                                {subjectLength}/100 characters
                            </div>
                            <template if:true={errors.subject}>
                                <div class="field-error">
                                    <span class="error-icon">✕</span>
                                    <span>{errors.subject}</span>
                                </div>
                            </template>
                            <div class="field-hint">Minimum 5 characters required</div>
                        </div>

                        <div class="form-row two-col">
                            <div class="form-group">
                                <label class="form-label">
                                    Product Category
                                    <span class="required-indicator">*</span>
                                </label>
                                <select
                                    data-field="product"
                                    class={productSelectClass}
                                    onchange={handleProduct}
                                    required
                                >
                                    <option value="">-- Select a Product --</option>
                                    <option value="Mobile">📱 Mobile</option>
                                    <option value="Laptop">💻 Laptop</option>
                                    <option value="Television">📺 Television</option>
                                    <option value="Home Appliance">🏠 Home Appliance</option>
                                    <option value="Warranty">🛡️ Warranty</option>
                                </select>
                                <template if:true={errors.product}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.product}</span>
                                    </div>
                                </template>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Issue Category
                                    <span class="required-indicator">*</span>
                                </label>
                                <select
                                    data-field="issueCategory"
                                    class={issueCategorySelectClass}
                                    onchange={handleIssue}
                                    required
                                >
                                    <option value="">-- Select Issue Type --</option>
                                    <option value="Hardware Issue">Hardware Issue</option>
                                    <option value="Software Issue">Software Issue</option>
                                    <option value="Installation Issue">Installation Issue</option>
                                    <option value="Warranty Claim">Warranty Claim</option>
                                    <option value="Replacement Request">Replacement Request</option>
                                    <option value="Other">Other</option>
                                </select>
                                <template if:true={errors.issueCategory}>
                                    <div class="field-error">
                                        <span class="error-icon">✕</span>
                                        <span>{errors.issueCategory}</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Description
                                <span class="required-indicator">*</span>
                            </label>
                            <textarea
                                data-field="description"
                                class={descriptionTextareaClass}
                                placeholder="Please provide detailed information about your issue..."
                                oninput={handleDescription}
                                maxlength="2000"
                                rows="6"
                                required
                            ></textarea>
                            <div class={descriptionCharCountClass}>
                                {descriptionLength}/2000 characters
                            </div>
                            <template if:true={errors.description}>
                                <div class="field-error">
                                    <span class="error-icon">✕</span>
                                    <span>{errors.description}</span>
                                </div>
                            </template>
                            <div class="field-hint">Minimum 10 characters required</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">
                                Attachments
                                <span class="optional-indicator">(Optional)</span>
                            </label>
                            <input
                                type="file"
                                data-field="attachments"
                                class="form-file-input"
                                accept="image/*"
                                multiple
                                onchange={handleAttachmentChange}
                                disabled={isSubmitDisabled}
                            />
                            <div class="field-hint">{attachmentHint}</div>

                            <template if:true={isReadingAttachments}>
                                <div class="field-hint">Reading selected files...</div>
                            </template>

                            <template if:true={hasAttachmentError}>
                                <div class="field-error">
                                    <span class="error-icon">✕</span>
                                    <span>{attachmentError}</span>
                                </div>
                            </template>

                            <template if:true={hasAttachments}>
                                <div class="attachment-list">
                                    <template for:each={attachments} for:item="attachment">
                                        <div key={attachment.id} class="attachment-item">
                                            <div class="attachment-meta">
                                                <span class="attachment-name">{attachment.fileName}</span>
                                                <span class="attachment-size">{attachment.sizeLabel}</span>
                                            </div>
                                            <button
                                                class="remove-attachment-btn"
                                                type="button"
                                                data-id={attachment.id}
                                                onclick={handleRemoveAttachment}
                                                disabled={isSubmitDisabled}
                                            >
                                                Remove
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>

                        <div class="buttons-container">
                            <button
                                class="btn btn-submit"
                                type="button"
                                onclick={handleSubmit}
                                disabled={isSubmitDisabled}
                            >
                                <template if:true={isLoading}>
                                    <div class="loading-spinner"></div>
                                    <span>Submitting...</span>
                                </template>
                                <template if:false={isLoading}>
                                    <span>Submit Request</span>
                                </template>
                            </button>
                            <button
                                class="btn btn-reset"
                                type="button"
                                onclick={handleReset}
                                disabled={isSubmitDisabled}
                            >
                                Clear Form
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <template if:true={toastVisible}>
            <div class={toastClass} role="status" aria-live="assertive">
                <span class="toast-mark">{toastSymbol}</span>
                <div class="toast-content">
                    <p class="toast-title">{toastTitle}</p>
                    <p class="toast-message">{toastMessage}</p>
                </div>
                <button class="toast-close" type="button" onclick={closeToast} aria-label="Close notification">
                    ×
                </button>
            </div>
        </template>
    </section>
</template>
